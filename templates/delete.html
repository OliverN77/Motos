<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/delete.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <title>Eliminar Moto</title>
</head>
<body>
    <div class="overlay"></div>
    
    <div class="modal">
        <div class="modal-content">
            {% if mensaje %}
            <div class="icon-container success">
                <i class="fa-solid fa-circle-check"></i>
            </div>
            <h2>¡Operación Exitosa!</h2>
            <p class="mensaje">{{ mensaje }}</p>
            {% else %}
            <div class="icon-container error">
                <i class="fa-solid fa-circle-xmark"></i>
            </div>
            <h2>Error</h2>
            <p class="mensaje">No se pudo eliminar la moto</p>
            {% endif %}
            
            <div class="progress-bar">
                <div class="progress"></div>
            </div>
            
            <a href="{{ url_for('read.home') }}" class="btn-volver">
                <i class="fa-solid fa-arrow-left"></i> Volver Ahora
            </a>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/delete.js') }}"></script>
</body>
</html>
