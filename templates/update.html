<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/update.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <title>Editar Moto</title>
</head>

<body>
    <a href="{{ url_for('read.home') }}" class="back-button">
        <i class="fa-solid fa-arrow-left"></i> Volver
    </a>

    <div class="container">
        <h1><i class="fa-solid fa-pen-to-square"></i> Editar Moto</h1>
        <p class="subtitle">Modifica los datos de la motocicleta</p>
        
        {% if mensaje %}
        <p class="mensaje success">
            <i class="fa-solid fa-circle-check"></i> {{ mensaje }}
        </p>
        {% endif %}

        <form method="POST" action="/update_item">
            <input type="hidden" name="form_type" value="update">
            {% for m in moto %}
            <input type="hidden" name="id" value="{{ m[0] }}">
            
            <div class="id-display">
                <i class="fa-solid fa-hashtag"></i> ID: {{ m[0] }}
            </div>

            <div class="form-group">
                <label for="modelo">
                    <i class="fa-solid fa-tag"></i> Modelo
                </label>
                <input type="text" id="modelo" value="{{ m[1] }}" name="modelo" required>
            </div>

            <div class="form-group">
                <label for="marca">
                    <i class="fa-solid fa-building"></i> Marca
                </label>
                <input type="text" id="marca" value="{{ m[2] }}" name="marca" required>
            </div>

            <div class="form-group">
                <label for="color">
                    <i class="fa-solid fa-palette"></i> Color
                </label>
                <input type="text" id="color" value="{{ m[3] }}" name="color" required>
            </div>

            <div class="form-group">
                <label for="cilindraje">
                    <i class="fa-solid fa-gauge-high"></i> Cilindraje
                </label>
                <input type="number" id="cilindraje" value="{{ m[4] }}" name="cilindraje" required>
            </div>

            <button type="submit">
                <i class="fa-solid fa-floppy-disk"></i> Actualizar Moto
            </button>
            {% endfor %}
        </form>
    </div>

    <script src="{{ url_for('static', filename='js/update.js') }}"></script>
</body>

</html>
